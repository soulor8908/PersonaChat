# PersonaChat CI — AI-Native 门禁管线
# 适配技术栈: Hono + CF Workers + 微信小程序 + pnpm workspace

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trinity:
    name: trinity (typecheck + rules + lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Rule check
        run: pnpm check
        # check-rules.mjs — 16 项 enforcement，阻断项不通过则 CI 红

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  spec-binding:
    name: spec-binding (Dx <-> code)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Spec-Binding check
        run: node scripts/check-spec-binding.mjs

  retro-gate:
    name: retro (G8 gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Retro index check (META-005)
        run: node scripts/gen-retro-index.mjs

  smoke-test:
    name: smoke-test (health + models)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install + test
        run: pnpm install --frozen-lockfile && pnpm dev:api &
        shell: bash

      - name: Wait + smoke
        run: sleep 5 && node scripts/smoke-test.mjs
        shell: bash

  frontend-test:
    name: frontend (vitest + jsdom)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend unit tests (jsdom)
        working-directory: apps/web
        run: pnpm test

      - name: Frontend lint (Tailwind class checks)
        working-directory: apps/web
        run: pnpm lint

  deploy-staging:
    name: deploy-staging
    if: github.ref == 'refs/heads/main'
    needs: [trinity, spec-binding, retro-gate, frontend-test, smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Deploy to staging
        run: npx wrangler deploy --env production
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
