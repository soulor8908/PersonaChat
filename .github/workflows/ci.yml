# PersonaChat CI — AI-Native 门禁管线
# 适配技术栈: Hono + CF Workers + 微信小程序 + pnpm workspace

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trinity:
    name: trinity (typecheck + rules + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Rule check
        run: pnpm check
        # check-rules.mjs — 15 项 enforcement，阻断项不通过则 CI 红

      - name: Unit tests
        run: pnpm test

  spec-binding:
    name: spec-binding (Dx ↔ code)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Spec-Binding check
        run: node scripts/check-spec-binding.mjs

  # 小程序 E2E 暂无 CI 自动化 — 微信小程序依赖开发者工具和真机环境
  # 路线图：后续接入 miniprogram-automator 或 API 级 E2E
