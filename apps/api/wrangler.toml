name = "persona-chat-api"
main = "src/server.ts"
compatibility_date = "2025-01-01"

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "persona-chat-db"
database_id = "fc79067a-1948-41ef-903b-5a39ee997696"

# ── 生产环境 ──
[env.production]
name = "persona-chat-api"

# 生产环境 D1（环境不继承顶层配置）
[[env.production.d1_databases]]
binding = "DB"
database_name = "persona-chat-db"
database_id = "fc79067a-1948-41ef-903b-5a39ee997696"

[env.production.vars]
ENVIRONMENT = "production"

# ── 环境变量 ──
[vars]
ENVIRONMENT = "development"

# ── 生产环境变量（通过 wrangler secret 配置，不在此文件存储）──
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put GLM_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put API_KEY
# wrangler secret put ALLOWED_ORIGINS

# ── 安全：wrangler.toml 不应包含 secrets，提交到 git 前确认无敏感信息 ──
